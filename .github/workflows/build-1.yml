name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Init Bubblewrap
        run: bubblewrap init --manifest https://nadjetgolden.github.io/rassikh/manifest.json --directory twa-app
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true
      - name: Build APK
        run: |
          cd twa-app
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rasikh-apk
          path: twa-app/*.apk
