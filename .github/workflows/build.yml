name: Build APK
'on':
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - name: Setup Python imaging
      run: pip install Pillow --break-system-packages -q
    - name: Create project files
      run: 'mkdir -p twa/app/src/main/res/mipmap-xxxhdpi

        curl -L "https://nadjetgolden.github.io/rassikh/icon-512x512.png" -o /tmp/icon_src.png

        python3 -c "from PIL import Image; img=Image.open(''/tmp/icon_src.png'').convert(''RGBA'');
        bg=Image.new(''RGBA'',img.size,(37,79,23,255)); bg.paste(img,mask=img.split()[3]);
        bg.convert(''RGB'').save(''twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png'')"

        printf ''include ":app"'' > twa/settings.gradle

        printf ''android.useAndroidX=true\nandroid.enableJetifier=true\n'' > twa/gradle.properties

        printf ''buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies
        { classpath "com.android.tools.build:gradle:8.2.0" }\n}\nallprojects { repositories
        { google(); mavenCentral() } }\n'' > twa/build.gradle

        printf ''plugins { id "com.android.application" }\nandroid {\n  compileSdk
        34\n  namespace "io.github.nadjetgolden.rassikh"\n  defaultConfig {\n    applicationId
        "io.github.nadjetgolden.rassikh"\n    minSdk 21\n    targetSdk 34\n    versionCode
        1\n    versionName "1.0"\n  }\n  buildTypes { release { minifyEnabled false;
        signingConfig signingConfigs.debug } }\n}\ndependencies {\n  implementation
        "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"\n}\n'' > twa/app/build.gradle

        printf ''<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n  <application
        android:label="Rassikh" android:icon="@mipmap/ic_launcher">\n    <activity
        android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true">\n      <meta-data
        android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://nadjetgolden.github.io/rassikh/"
        />\n      <intent-filter android:autoVerify="true">\n        <action android:name="android.intent.action.MAIN"/>\n        <category
        android:name="android.intent.category.LAUNCHER"/>\n      </intent-filter>\n    </activity>\n  </application>\n</manifest>\n''
        > twa/app/src/main/AndroidManifest.xml

        '
    - name: Build APK
      run: 'cd twa

        gradle wrapper

        ./gradlew assembleRelease

        '
    - uses: actions/upload-artifact@v4
      with:
        name: rasikh-apk
        path: twa/app/build/outputs/apk/**/*.apk
